name: mobile
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  intl: ^0.20.2
  easy_localization: ^3.0.7
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.2
  get_it: ^8.0.3
  flutter_svg: ^2.0.16
  dartz: ^0.10.1
  dio: ^5.7.0
  shimmer: ^3.0.0
  firebase_messaging: ^15.1.6
  firebase_core: ^3.8.1
  flutter_local_notifications: ^18.0.1
  logger: ^2.5.0
  go_router: ^14.6.2
  google_maps_flutter: ^2.10.0
  google_maps_flutter_android: ^2.14.10
  google_maps_flutter_platform_interface: ^2.10.0
  permission_handler: ^11.3.1
  timeago: ^3.7.0
  google_sign_in: ^7.2.0
  # Web-only federated impl of google_sign_in — required for the rendered
  # Google button (renderButton) which is the only supported interactive
  # sign-in path on the web in v7+.
  google_sign_in_web: ^1.0.0
  timer_count_down: ^2.2.2
  geolocator: ^14.0.2
  flutter_dotenv: ^6.0.1



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  build_runner: ^2.4.13


flutter:

  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
    - assets/language/
    - .env
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # example:
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: RobotoSlab
      fonts:
        - asset: assets/fonts/RobotoSlab-Regular.ttf
        - asset: assets/fonts/RobotoSlab-Bold.ttf
          weight: 700