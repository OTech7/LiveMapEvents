server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Gzip compression for Flutter web assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/wasm image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── NEVER cache the Flutter entrypoints ──
    # These live at fixed (non-hashed) paths, so a new deploy must replace
    # them on every visit. Caching them is what causes "nothing changed in
    # the frontend" after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }
    location = /flutter.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }
    location = /main.dart.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }
    location = /version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }
    location = /favicon.ico {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires off;
        try_files $uri =404;
    }

    # Cache the genuinely-hashed assets aggressively (canvaskit, deferred
    # chunks, fonts pulled from /assets/, etc.).
    location ~* \.(wasm|png|jpg|jpeg|gif|svg|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other JS/CSS in subpaths (e.g. /assets/, deferred chunks) — short cache,
    # but allow revalidation. Safer than "immutable" for anything not provably
    # content-hashed.
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # Flutter web SPA — all routes fall back to index.html
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
