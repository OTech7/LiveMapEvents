# ============================================================
# LiveMapEvents — Server Configuration
# ============================================================
# FILL IN YOUR VALUES BELOW, then run:
#   cp server.conf.example server.conf
#   nano server.conf           (edit with your real values)
#   ./deploy-remote.sh         (deploy from your Mac)
# ============================================================

# ── Your Server ──
SERVER_IP=0.0.0.0                           # <-- Your server IP (e.g. 165.22.48.100)
SERVER_HOSTNAME=your-domain.com            # <-- Your domain, or same as SERVER_IP if no domain
SERVER_USER=deploy                         # <-- SSH user on the server
SERVER_SSH_KEY="/path/to/your/ssh/key"     # <-- Path to your SSH private key
SERVER_DEPLOY_PATH=/opt/livemap            # <-- Where the app lives on the server

# ── App Settings ──
APP_PORT=8080                              # <-- Port the backend API listens on
FRONTEND_PORT=3000                         # <-- Port the Flutter web frontend listens on
APP_ENV=production
APP_DEBUG=false
APP_KEY=                                   # <-- Run: docker exec livemap-app php artisan key:generate --show

# ── Database ──
DB_HOST=your-db-host.aivencloud.com        # <-- From Aiven console (hostname only, not the full URL)
DB_PORT=16462                              # <-- From Aiven console
DB_DATABASE=defaultdb
DB_USERNAME=avnadmin
DB_PASSWORD=CHANGE_ME                      # <-- From Aiven console
DB_SSLMODE=require

# ── Google OAuth ──
GOOGLE_CLIENT_ID=CHANGE_ME                 # <-- From Google Cloud Console

# ── UltraMsg (WhatsApp OTP) ──
ULTRAMSG_URL=https://api.ultramsg.com
ULTRAMSG_INSTANCE_ID=CHANGE_ME            # <-- From ultramsg.com dashboard
ULTRAMSG_TOKEN=CHANGE_ME                  # <-- From ultramsg.com dashboard